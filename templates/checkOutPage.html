{% extends 'include/layout.html' %}

{% block content %}

<style>
    .content-wrapper 
    {
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
        max-width: none !important;
    }

    html, body 
    {
        height: 100%;
        margin: 0;
        padding: 0;
    }
</style>

    <div class="checkout-container">
            <div class= "halves-container">
                <div class= "div-left-half">
                        <section>
                        <h1 style= "color: #4D6B3B; font-family: 'Prata', serif;">CHECKOUT</h1>
                            <div>
                                <h3 style= "color: #4D6B3B; font-family: 'Prata', serif;">Contact:</h3>
                                <div class="checkout-details">
                                </div>
                            </div>

                            <div>
                                <h3 style= "color: #4D6B3B; font-family: 'Prata', serif;">Delivery:</h3>
                                <div class="checkout-details">
                                </div>
                            </div>

                            <div>
                                <h3 style= "color: #4D6B3B; font-family: 'Prata', serif;">Shipping Method:</h3>
                                <div class="checkout-details">
                                </div>
                            </div>

                            <div>
                                <h3 style= "color: #4D6B3B; font-family: 'Prata', serif;">Payment Total:</h3>
                                <div class="checkout-details">
                                </div>
                            </div>

                            <form action="{{ url_for('views.processCheckout') }}" method="POST">
                                <button class="checkout-button">Make Payment</button>
                            </form>
                    </section>
                </div>

                <div class= "div-right-half">
                    <h2 class="summary-title">Order Summary</h2>
                        {% for item in cart_items %}
                            <div class="summary-item">
                                <span>{{ item.commonName }}</span>
                                <span>${{ item.subtotal }}</span>
                            </div>
                        {% endfor %}

                        <div class="summary-total">
                            <span>Total</span>
                            <span>${{ total }}</span>
                        </div>
                    </div>
                </div>
            </div>
    </div>

    <style>
        .halves-container
        {
            display: flex;
            width: 100%;
            height: 100%;
        }
        
        .div-left-half
        {
            width: 50%;
            padding: 40px;
        }

        .checkout-details
        {
            background-color: #D9D9D9;
            width: 75%;
            height: 80px;
            margin-bottom: 20px;
        }

        .checkout-container
        {
            width: 100%;
            height: 100vh;
        }

        .checkout-button
        {
            background-color:#003121;
            font-family: 'Prata', serif;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            margin-top: 20px;
        }

        .checkout-button:hover
        {
            background-color: #007B53;
        }

        .div-right-half 
        {
            width: 50%;
            background-color: #4D6B3B;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            color: white;
        }

        .order-summary 
        {
            width: 100%;
        }

        .summary-title 
        {
            font-family: 'Prata', serif;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .summary-item,
        .summary-total 
        {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .summary-total 
        {
            font-weight: bold;
            font-size: 1.4rem;
            margin-top: 20px;
        }

    </style>

{% endblock %}
