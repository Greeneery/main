{% extends 'include/layout.html' %}

{% block content %}
<div class="browse-container">

    {% include 'include/sidebar.html' %}


    <main class="browse-main">
        <div class="browse-header">
            <h1 class="browse-title">BROWSE</h1>
            <div class="sort-dropdown">SORT BY FEATURED ▾</div>
        </div>

        <div class="product-grid">
            {% for i in range(6) %}
            <a href="{{ url_for('views.descriptionPage') }}" class="product-card">
                <div class="product-image">
                    <img src="{{ url_for('static', filename='images/homeBG.jpg') }}" alt="Plant Name">
                </div>
                <div class="product-info">
                    <span class="product-name">Snake Plant</span>
                    <span class="product-price">$25</span>
                    <span class="favorite-icon">♥</span>
                </div>
            </a>
            {% endfor %}
        </div>
    </main>
</div>
{% endblock %}
